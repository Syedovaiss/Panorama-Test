# If changing this image ID, please also change it in .devcontainer/Dockerfile
image: registry.gitlab.arm.com/kleidi/kleidicv:17

variables:
  KUBERNETES_CPU_REQUEST: "16"
  KUBERNETES_MEMORY_REQUEST: "16Gi"

# Only run CI for main branch & merge requests
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

.common:
  tags:
    - arm64
  script:
    - scripts/ci.sh
  artifacts:
    when: always
    expire_in: 1 day
    reports:
      junit: build/ci/test-results/**/*.xml
      coverage_report:
        coverage_format: cobertura
        path: build/ci/cobertura-coverage.xml
    paths:
      - build/ci/html
  coverage: /^line and branch coverage:\s+([\d\.]+\%)/

# On the main branch publish pages.
pages:
  extends: .common
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  publish: build/ci/html

# On other branches don't publish pages.
test:
  extends: .common
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
